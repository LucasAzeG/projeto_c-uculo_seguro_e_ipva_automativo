<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoa - Veículo</title>

    <link rel="stylesheet" href="css/style_veiculos.css">

</head>
<body>
    <div id="geral">
        <h3>Cadastro do Veículo</h3>

        <div id="div-form-pessoa">
            <form id="div-form-pessoa">

              <label for="modelo">modelo</label>
              <input type="text" name="modelo" id="modelo">

              <label for="marca">Marca</label>
              <input type="text" name="marca" id="marca">

              <label for="placa">Placa</label>
              <input type="text" name="placa" id="placa">

              <label for="ano">Ano de Fabricação</label>
              <input type="text" name="ano" id="ano">

              <label for="valor">Valor de Mercado do Veículo</label>
              <input type="text" name="valor" id="valor">

              <label for="tipodc">Tipo de Combustível</label>
              <input type="text" name="tipodc" id="tipodc">

              <button type="submit" id="btn-add"> Adicionar </button>
              <button type="reset" id="btn-limpar"> Limpar </button>
           </form>


        </div>
    </div>    

</body>
</html>
